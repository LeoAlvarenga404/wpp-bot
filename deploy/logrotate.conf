/var/log/wpp-bot/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 wppbot wppbot
    sharedscripts
    postrotate
        # systemd's append: redirector keeps an open fd; signal to reopen.
        systemctl kill -s HUP wpp-bot.service 2>/dev/null || true
    endscript
}
